name: CI / Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-dotnet:
    name: Build .NET Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PVZ.sln

      - name: Build
        run: dotnet build PVZ.sln --configuration ExportRelease --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-binaries
          path: .

  export-godot:
    name: Export Game
    needs: build-dotnet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 这里必须对应 .cfg 文件里的 name="Linux" 和 name="Windows"
        platform: [Linux, Windows] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download .NET Binaries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-binaries
          path: .

      - name: Godot Export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          presets_to_export: ${{ matrix.platform }}
          # 导出到对应的文件夹
          relative_export_path: "Output/${{ matrix.platform }}"

      - name: Upload Exported Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-release
          path: Output/${{ matrix.platform }}/*.zip

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: export-godot
    runs-on: ubuntu-latest
    steps:
      - name: Download All Exports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: ./release-files
          merge-multiple: true

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*.zip"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
