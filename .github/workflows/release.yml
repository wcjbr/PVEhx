name: CI / Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write # 允许创建 Release 并上传文件

jobs:
  build-dotnet:
    name: Build .NET Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PVZ.sln

      - name: Build
        # 使用你 .sln 中定义的正确配置名称
        run: dotnet build PVZ.sln --configuration ExportRelease --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-binaries
          path: .

  export-godot:
    name: Export Godot Game
    needs: build-dotnet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download .NET Binaries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-binaries
          path: .

      - name: Godot Android/Linux Export
        uses: firebelley/godot-export@v6.0.0
        with:
          # 下载官方 4.3 稳定版 (Headless 模式)
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux_headless.64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_export_output: true
          # 确保你在 Godot 编辑器里的导出预设名称叫 "Linux/X11"
          # 如果你的预设叫 "Linux"，请修改下方名称
          export_preset_name: Linux/X11
          use_godot_4: true

      - name: Upload Exported Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ./*.zip

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: export-godot
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Export
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: ./release-files

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*.zip"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
