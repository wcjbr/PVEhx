name: CI / Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-dotnet:
    name: Build .NET Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PVZ.sln

      - name: Build
        # 使用你 .sln 中定义的 ExportRelease 配置
        run: dotnet build PVZ.sln --configuration ExportRelease --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-binaries
          path: .

  export-godot:
    name: Export Godot Game
    needs: build-dotnet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download .NET Binaries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-binaries
          path: .

      - name: Godot Export
        uses: firebelley/godot-export@v6.0.0
        with:
          # 确保使用带有 _mono_ 的版本以支持 C#
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          # 根据你的日志，这里必须匹配预设名称 "Linux"
          presets_to_export: "Linux"
          relative_export_path: "Output/PVZ"

      - name: Upload Exported Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ./*.zip

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: export-godot
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Export
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: ./release-files

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*.zip"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
