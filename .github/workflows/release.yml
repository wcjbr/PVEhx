name: CI / Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-dotnet:
    name: Build .NET Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build PVZ.sln --configuration ExportRelease

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-binaries
          path: .

  export-godot:
    name: Export Game
    needs: build-dotnet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [Linux, Windows, Android] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java (Android Required)
        if: matrix.platform == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'Android'
        uses: android-actions/setup-android@v3

      - name: Download Godot & Templates
        run: |
          # 下载 Godot Mono 版
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
          unzip Godot_v4.3-stable_mono_linux_x86_64.zip
          mv Godot_v4.3-stable_mono_linux_x86_64/Godot_v4.3-stable_mono_linux.x86_64 godot
          mv Godot_v4.3-stable_mono_linux_x86_64/GodotSharp .
          
          # 下载导出模板
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable.mono
          unzip -q Godot_v4.3-stable_mono_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable.mono
          mv ~/.local/share/godot/export_templates/4.3.stable.mono/templates/* ~/.local/share/godot/export_templates/4.3.stable.mono/
          chmod +x godot

      - name: Generate Temporary Keystore (Android)
        if: matrix.platform == 'Android'
        run: |
          keytool -genkey -v -keystore release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug, O=Android, C=US"

      - name: Force Enable Experimental .NET Export
        if: matrix.platform == 'Android'
        run: |
          # 强制在编辑器设置中开启实验性支持
          mkdir -p ~/.config/godot
          echo 'dotnet/android/enable_experimental_export = true' >> ~/.config/godot/editor_settings-4.trep
          # 同时也写入项目文件以防万一
          echo 'dotnet/android/enable_experimental_export=true' >> project.godot

      - name: Download .NET Binaries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-binaries
          path: .

      - name: Execute Godot Export
        run: |
          mkdir -p Output/${{ matrix.platform }}
          if [ "${{ matrix.platform }}" == "Android" ]; then
            ./godot --headless --verbose --export-release "Android" "Output/Android/PVZ.apk"
          elif [ "${{ matrix.platform }}" == "Windows" ]; then
            ./godot --headless --verbose --export-release "Windows" "Output/Windows/PVZ.exe"
            cd Output/Windows && zip -r ../../Windows-Release.zip . && cd ../..
          else
            ./godot --headless --verbose --export-release "Linux" "Output/Linux/PVZ.x86_64"
            cd Output/Linux && zip -r ../../Linux-Release.zip . && cd ../..
          fi

      - name: Upload Exported Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-release
          path: |
            *.zip
            Output/Android/*.apk

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: export-godot
    runs-on: ubuntu-latest
    steps:
      - name: Download All Exports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: ./release-files
          merge-multiple: true

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*.zip,release-files/*.apk"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
