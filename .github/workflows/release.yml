name: CI / Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-dotnet:
    name: Build .NET Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build PVZ.sln --configuration ExportRelease

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-binaries
          path: .

  export-godot:
    name: Export Game
    needs: build-dotnet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [Linux, Windows, Android] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java (Android Required)
        if: matrix.platform == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'Android'
        uses: android-actions/setup-android@v3

      # 关键步骤 1：生成临时安卓证书
      - name: Generate Temporary Keystore
        if: matrix.platform == 'Android'
        run: |
          keytool -genkey -v -keystore release.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug, O=Android, C=US"

      # 关键步骤 2：强制开启实验性 .NET 导出支持
      # 这样 Godot 就不会因为 "C#/.NET is experimental" 而报错退出
      - name: Enable Experimental .NET Export
        if: matrix.platform == 'Android'
        run: |
          mkdir -p ~/.config/godot
          echo '[network/debug]' > ~/.config/godot/editor_settings-4.trep
          echo 'dotnet/android/enable_experimental_export = true' >> ~/.config/godot/editor_settings-4.trep

      - name: Download .NET Binaries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-binaries
          path: .

      - name: Godot Export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: ${{ matrix.platform != 'Android' }}
          presets_to_export: ${{ matrix.platform }}
          relative_export_path: "Output/${{ matrix.platform }}"
          # 增加额外的导出标志（如果 Action 支持）
          verbose: true

      - name: Upload Exported Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-release
          path: |
            Output/${{ matrix.platform }}/*.zip
            Output/${{ matrix.platform }}/*.apk

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: export-godot
    runs-on: ubuntu-latest
    steps:
      - name: Download All Exports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: ./release-files
          merge-multiple: true

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*.zip,release-files/*.apk"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
